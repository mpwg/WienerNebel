name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  setup:
    name: Install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  build-apps:
    name: Build Apps / ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        package:
          - "@wiener-nebel/web"
          - "@wiener-nebel/mobile"
          - "@wiener-nebel/edge-api"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter "${{ matrix.package }}" build

      - name: Check package
        run: pnpm --filter "${{ matrix.package }}" check

  build-packages:
    name: Build Packages / ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        package:
          - "@wiener-nebel/contracts"
          - "@wiener-nebel/domain"
          - "@wiener-nebel/map-data"
          - "@wiener-nebel/map-tools"
          - "@wiener-nebel/ui-tokens"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter "${{ matrix.package }}" build

      - name: Check package
        run: pnpm --filter "${{ matrix.package }}" check

  workspace:
    name: Workspace
    runs-on: ubuntu-latest
    needs:
      - build-apps
      - build-packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Check workspace
        run: pnpm check

      - name: Audit dependencies
        run: pnpm audit
